---
- name: Load Configuration
  hosts: localhost
  gather_facts: no
  connection: local

  tasks:
    - name: Load configuration file
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/config.yml"
        name: config

    - name: Validate user management configuration
      ansible.builtin.assert:
        that:
          - config.user_management is defined
          - config.user_management.enabled is defined
          - config.user_management.enabled == true
          - config.user_management.username is defined
          - config.user_management.ssh_public_key is defined
        fail_msg: "Please enable and configure user_management section in config.yml"

    - name: Check if SSH public key file exists
      ansible.builtin.stat:
        path: "{{ config.user_management.ssh_public_key | expanduser }}"
      register: pubkey_file

    - name: Fail if SSH public key file doesn't exist
      ansible.builtin.fail:
        msg: "SSH public key file not found: {{ config.user_management.ssh_public_key }}"
      when: not pubkey_file.stat.exists

    - name: Set global facts from config
      ansible.builtin.set_fact:
        ssh_private_key: "{{ config.ssh.private_key | expanduser }}"
        ssh_port: "{{ config.ssh.port | default(22) }}"
        new_username: "{{ config.user_management.username }}"
        new_user_group: "{{ config.user_management.group | default('full') }}"
        new_user_password: "{{ config.user_management.password | default('') }}"
        ssh_public_key_path: "{{ config.user_management.ssh_public_key | expanduser }}"
      delegate_to: localhost
      delegate_facts: true

- name: Create User on MikroTik Routers
  hosts: mikrotik_routers
  gather_facts: no

  vars:
    new_username: "{{ hostvars['localhost']['new_username'] }}"
    new_user_group: "{{ hostvars['localhost']['new_user_group'] }}"
    new_user_password: "{{ hostvars['localhost']['new_user_password'] }}"
    ssh_private_key: "{{ hostvars['localhost']['ssh_private_key'] }}"
    ssh_port: "{{ hostvars['localhost']['ssh_port'] }}"
    ssh_public_key_path: "{{ hostvars['localhost']['ssh_public_key_path'] }}"
    ssh_target: "{{ ansible_user }}@{{ ansible_host }}"
    remote_pubkey_file: "{{ new_username }}-ansible-key.pub"

  tasks:
    - name: Check if user already exists
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_private_key }}"
          - -p
          - "{{ ssh_port | string }}"
          - -o
          - BatchMode=yes
          - -o
          - ConnectTimeout=15
          - "{{ ssh_target }}"
          - "/user print where name={{ new_username }}"
      register: user_check
      delegate_to: localhost
      failed_when: false
      changed_when: false

    - name: Create user if it doesn't exist
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_private_key }}"
          - -p
          - "{{ ssh_port | string }}"
          - -o
          - BatchMode=yes
          - -o
          - ConnectTimeout=15
          - "{{ ssh_target }}"
          - >-
            /user add name={{ new_username }} group={{ new_user_group }}{% if new_user_password %} password="{{ new_user_password | replace('"', '\"') }}"{% endif %}
      when: user_check.stdout == ""
      delegate_to: localhost

    - name: Update user group if user exists
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_private_key }}"
          - -p
          - "{{ ssh_port | string }}"
          - -o
          - BatchMode=yes
          - -o
          - ConnectTimeout=15
          - "{{ ssh_target }}"
          - "/user set [find where name={{ new_username }}] group={{ new_user_group }}"
      when: user_check.stdout != ""
      delegate_to: localhost

    - name: Update user password if provided and user exists
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_private_key }}"
          - -p
          - "{{ ssh_port | string }}"
          - -o
          - BatchMode=yes
          - -o
          - ConnectTimeout=15
          - "{{ ssh_target }}"
          - >-
            /user set [find where name={{ new_username }}] password="{{ new_user_password | replace('"', '\"') }}"
      when:
        - user_check.stdout != ""
        - new_user_password != ""
      delegate_to: localhost
      no_log: true

    - name: Remove old SSH keys for user if they exist
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_private_key }}"
          - -p
          - "{{ ssh_port | string }}"
          - -o
          - BatchMode=yes
          - -o
          - ConnectTimeout=15
          - "{{ ssh_target }}"
          - "/user ssh-keys remove [find where user={{ new_username }}]"
      delegate_to: localhost
      failed_when: false

    - name: Upload SSH public key to router
      ansible.builtin.command:
        argv:
          - scp
          - -i
          - "{{ ssh_private_key }}"
          - -P
          - "{{ ssh_port | string }}"
          - -o
          - BatchMode=yes
          - -o
          - ConnectTimeout=15
          - "{{ ssh_public_key_path }}"
          - "{{ ssh_target }}:{{ remote_pubkey_file }}"
      delegate_to: localhost

    - name: Import uploaded SSH public key for user
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_private_key }}"
          - -p
          - "{{ ssh_port | string }}"
          - -o
          - BatchMode=yes
          - -o
          - ConnectTimeout=15
          - "{{ ssh_target }}"
          - "/user ssh-keys import user={{ new_username }} public-key-file={{ remote_pubkey_file }}"
      delegate_to: localhost

    - name: Remove uploaded SSH public key file from router
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ ssh_private_key }}"
          - -p
          - "{{ ssh_port | string }}"
          - -o
          - BatchMode=yes
          - -o
          - ConnectTimeout=15
          - "{{ ssh_target }}"
          - "/file remove {{ remote_pubkey_file }}"
      delegate_to: localhost
      failed_when: false

    - name: Display success message
      ansible.builtin.debug:
        msg:
          - "User '{{ new_username }}' configured successfully on {{ inventory_hostname }}"
          - "Group: {{ new_user_group }}"
          - "SSH key: Added"
          - "{{ 'Password: Set' if new_user_password else 'Password: Not set (key-only authentication)' }}"
